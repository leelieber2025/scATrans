[build-system]
requires = ["setuptools>=61.0", "setuptools_scm[toml]>=6.2"]
build-backend = "setuptools.build_meta"

[project]
name = "scatrans"
dynamic = ["version"]
description = "Single-cell Active Transcription Analysis"
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
authors = [
    {name = "scATrans Developers"}
]
keywords = ["single-cell", "RNA-seq", "velocity", "active transcription", "bioinformatics"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Bio-Informatics",
]

dependencies = [
    "scanpy>=1.9,<2.0",
    "anndata>=0.8",
    "numpy>=1.21",
    "pandas>=1.3",
    "scipy>=1.7",
    "scikit-learn>=1.0",
    "joblib>=1.2",
    "statsmodels>=0.13",
    "matplotlib>=3.5",
]

[project.optional-dependencies]
advanced = ["scvelo>=0.3.0"]
dev = ["pytest>=7.0"]

[project.urls]
Homepage = "https://github.com/scATrans/scatrans"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
scatrans = ["data/*.parquet", "data/*.md"]

[tool.setuptools_scm]
write_to = "src/scatrans/_version.py"
