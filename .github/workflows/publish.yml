name: Publish to PyPI

# Manual only — creating a GitHub Release / tag does NOT upload to PyPI.
# Publish via: Actions → "Publish to PyPI" → Run workflow
# (or upload dist artifacts through your separate PyPI path).
on:
  workflow_dispatch:

concurrency:
  group: publish-pypi-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution 📦
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Build source and wheel distributions
        # Version is read from src/scatrans/_version.py (single source of truth).
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    # Trusted Publishing (OIDC). Configure the "pypi" environment in repo
    # Settings → Environments with required reviewers before first publish.
    permissions:
      id-token: write

    environment:
      name: pypi

    steps:
      - name: Download all dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # For publishing to TestPyPI instead (for testing the workflow):
        # with:
        #   repository-url: https://test.pypi.org/legacy/
        #   verbose: true
