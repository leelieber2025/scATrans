name: Publish to PyPI

on:
  # Publish only when a GitHub Release is published (avoids duplicate runs when
  # "Create release" also creates a tag — push:tags would fire a second job).
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Force a specific version (SETUPTOOLS_SCM_PRETEND_VERSION). Useful for dev releases when not on a tag."
        required: false
        default: ""

concurrency:
  group: publish-pypi-${{ github.event.release.tag_name || github.run_id }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution 📦
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Critical for setuptools_scm to detect tags and produce correct version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Build source and wheel distributions
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "Using forced version: ${{ github.event.inputs.version }}"
            SETUPTOOLS_SCM_PRETEND_VERSION="${{ github.event.inputs.version }}" python -m build
          else
            python -m build
          fi

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    # Trusted Publishing (OIDC). Configure the "pypi" environment in repo
    # Settings → Environments with required reviewers before first release.
    permissions:
      id-token: write

    environment:
      name: pypi

    steps:
      - name: Download all dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # For publishing to TestPyPI instead (for testing the workflow):
        # with:
        #   repository-url: https://test.pypi.org/legacy/
        #   verbose: true