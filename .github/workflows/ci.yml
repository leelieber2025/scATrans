name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        install-extra:
          - ""
          - "advanced"
          - "pseudobulk"
          - "gene_features"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package with extras
        run: |
          pip install --upgrade pip
          EXTRA="${{ matrix.install-extra }}"
          if [ -n "$EXTRA" ]; then
            pip install -e ".[dev,$EXTRA]"
          else
            pip install -e ".[dev]"
          fi

      - name: Ruff lint
        run: |
          ruff check src/scatrans tests
          ruff format --check src/scatrans tests

      # Hard gate: keep src/scatrans mypy-clean (same flags as local/pre-commit).
      - name: Mypy (Python 3.11 core only)
        if: matrix.python-version == '3.11' && matrix.install-extra == ''
        run: mypy src/scatrans --ignore-missing-imports

      - name: Run fast tests
        run: PYTHONPATH=src:. python -m pytest -m "not plot and not slow" -q

      - name: Run slow tests (core / Python 3.11 only)
        if: matrix.python-version == '3.11' && matrix.install-extra == ''
        run: PYTHONPATH=src:. python -m pytest -m "slow and not plot" -q

      - name: Run plot tests (core / Python 3.11 only)
        if: matrix.python-version == '3.11' && matrix.install-extra == ''
        run: PYTHONPATH=src:. python -m pytest -m plot -q

      # Two coverage reports so default suite vs slow/integration are not mixed:
      #   coverage-default.xml  — not plot and not slow (daily gate)
      #   coverage-with-slow.xml — not plot (includes @pytest.mark.slow)
      # Fail if core DE module scatrans._de falls below 70% on the default suite.
      #
      # IMPORTANT: core matrix cell is pip install -e ".[dev]" only (no optional
      # science extras). Install the same optional stacks used by real analysis
      # *before* coverage so Codecov is not skip-inflated for:
      #   - _de / PyDESeq2 / memento  (pseudobulk + memento extras)
      #   - enrich/gsea.py             (gsea extra → gseapy)
      #   - pp_bias / gene_features    (gene_features extra → gtfparse)
      # The hard gate remains only scatrans._de ≥ 70% on the default suite.
      - name: Coverage (default suite / Python 3.11 core)
        if: matrix.python-version == '3.11' && matrix.install-extra == ''
        run: |
          pip install \
            "pydeseq2>=0.4.0" \
            "memento-de>=0.1.0,<0.3.0" \
            "gseapy>=1.1" \
            "gtfparse>=1.3.0"
          PYTHONPATH=src:. python -m pytest -m "not plot and not slow" \
            --cov=scatrans \
            --cov-report=xml:coverage-default.xml \
            --cov-report=term-missing:skip-covered \
            -q
          PYTHONPATH=src:. python - <<'PY'
          import xml.etree.ElementTree as ET
          root = ET.parse("coverage-default.xml").getroot()
          rate = None
          for cls in root.iter("class"):
              # filename may be scatrans/_de.py or absolute; match basename
              fn = cls.attrib.get("filename", "").replace("\\", "/")
              if fn.endswith("_de.py") and "scatrans" in fn:
                  rate = float(cls.attrib.get("line-rate", 0))
                  break
          if rate is None:
              for cls in root.iter("class"):
                  if cls.attrib.get("filename", "").endswith("_de.py"):
                      rate = float(cls.attrib.get("line-rate", 0))
                      break
          if rate is None:
              raise SystemExit("coverage-default.xml: could not find scatrans/_de.py")
          pct = 100.0 * rate
          print(f"scatrans._de default-suite line coverage: {pct:.1f}%")
          if pct < 70.0:
              raise SystemExit(f"scatrans._de coverage {pct:.1f}% < 70% threshold (default suite)")
          # Informational: optional-extra modules (not hard gates)
          for needle, label in (
              ("gsea.py", "enrich/gsea.py"),
              ("pp_bias.py", "pp_bias.py"),
          ):
              for cls in root.iter("class"):
                  fn = cls.attrib.get("filename", "").replace("\\", "/")
                  if fn.endswith(needle):
                      print(
                          f"{label} default-suite line coverage: "
                          f"{100.0 * float(cls.attrib.get('line-rate', 0)):.1f}%"
                      )
                      break
          PY

      - name: Coverage (with slow / Python 3.11 core)
        if: matrix.python-version == '3.11' && matrix.install-extra == ''
        run: |
          # Optional extras already installed in previous coverage step on this job.
          # with-slow includes @pytest.mark.slow (GSEA integration, long MixedLM, …).
          PYTHONPATH=src:. python -m pytest -m "not plot" \
            --cov=scatrans \
            --cov-report=xml:coverage-with-slow.xml \
            --cov-report=term \
            -q
          PYTHONPATH=src:. python - <<'PY'
          import xml.etree.ElementTree as ET
          root = ET.parse("coverage-with-slow.xml").getroot()
          for needle, label in (
              ("_de.py", "scatrans._de"),
              ("gsea.py", "enrich/gsea.py"),
              ("pp_bias.py", "pp_bias.py"),
          ):
              for cls in root.iter("class"):
                  fn = cls.attrib.get("filename", "").replace("\\", "/")
                  if fn.endswith(needle) and (needle != "_de.py" or "scatrans" in fn):
                      print(
                          f"{label} with-slow line coverage: "
                          f"{100.0 * float(cls.attrib.get('line-rate', 0)):.1f}%"
                      )
                      break
          PY

      - name: Upload coverage (optional)
        if: matrix.python-version == '3.11' && matrix.install-extra == ''
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage-default.xml,./coverage-with-slow.xml
          fail_ci_if_error: false